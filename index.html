---
layout: default
title: Home
---

<h1>{{ site.title }}</h1>
<p>{{ site.description }}</p>

<h2>Latest Guides</h2>
<ul class="post-list">
  {% for post in site.posts limit:20 %}
  <li>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <span>{{ post.date | date: '%Y-%m-%d' }}</span>
  </li>
  {% endfor %}
</ul>
